name: Coupang Data Fetcher

on:
  workflow_dispatch:
    inputs:
      categories:
        description: 'Category IDs (comma-separated, e.g. 1013,1016,1017)'
        required: false
        default: '1001,1002,1010,1011,1012,1013,1015,1016,1017,1018,1019,1020'
      limit:
        description: 'Products per category'
        required: false
        default: '20'
  schedule:
    # 매 4시간마다 미리 수집 (KST 01:00, 05:00, 09:00, 13:00, 17:00, 21:00)
    - cron: '0 16,20,0,4,8,12 * * *'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest  # GitHub 호스팅 (웹필터 외부)
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true

      - name: Fetch Coupang Best Categories
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          INPUT_CATEGORIES: ${{ github.event.inputs.categories || '1001,1002,1010,1011,1012,1013,1015,1016,1017,1018,1019,1020' }}
          INPUT_LIMIT: ${{ github.event.inputs.limit || '20' }}
        run: |
          python3 - << 'PYEOF'
          import hmac, hashlib, datetime, urllib.request, json, os, sys

          access = os.environ['COUPANG_ACCESS_KEY']
          secret = os.environ['COUPANG_SECRET_KEY']

          def make_auth(method, path, query='', with_question_mark=False):
              from time import gmtime, strftime
              dt = strftime('%y%m%d', gmtime()) + 'T' + strftime('%H%M%S', gmtime()) + 'Z'
              # 방식 A: ? 없음 (서버 coupang_api.py 방식)
              # 방식 B: ? 포함 (일부 문서 방식)
              q_part = ('?' + query if with_question_mark else query) if query else ''
              msg = dt + method + path + q_part
              sig = hmac.new(secret.encode(), msg.encode(), hashlib.sha256).hexdigest()
              return f'CEA algorithm=HmacSHA256, access-key={access}, signed-date={dt}, signature={sig}'

          def fetch_category(cat_id, limit=20):
              path = f'/v2/providers/affiliate_open_api/apis/openapi/products/bestcategories/{cat_id}'
              query = f'limit={limit}&subId=ggultongmon'
              # 두 방식 모두 시도
              for with_q in [False, True]:
                  auth = make_auth('GET', path, query, with_question_mark=with_q)
                  req = urllib.request.Request(
                      f'https://api-gateway.coupang.com{path}?{query}',
                      headers={'Authorization': auth, 'Content-Type': 'application/json;charset=UTF-8'}
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=15) as r:
                          raw = r.read()
                          for enc in ['utf-8', 'euc-kr', 'cp949', 'latin-1']:
                              try:
                                  data = json.loads(raw.decode(enc))
                                  if data.get('rCode') == '0':
                                      print(f'  cat {cat_id} 성공 (방식{"B" if with_q else "A"}): {len(data.get("data",[]))}개')
                                      return data.get('data', [])
                                  else:
                                      print(f'  cat {cat_id} rCode={data.get("rCode")} (방식{"B" if with_q else "A"})', file=sys.stderr)
                                  break
                              except Exception:
                                  continue
                  except Exception as e:
                      print(f'  cat {cat_id} 연결실패 (방식{"B" if with_q else "A"}): {e}', file=sys.stderr)
              return []

          cats_str = os.environ.get('INPUT_CATEGORIES', '1001,1002,1010,1011,1012,1013,1015,1016,1017,1018,1019,1020')
          limit_str = os.environ.get('INPUT_LIMIT', '20')
          cats = [int(x.strip()) for x in cats_str.split(',')]
          limit = int(limit_str)

          all_data = {}
          for cat in cats:
              products = fetch_category(cat, limit)
              print(f'카테고리 {cat}: {len(products)}개')
              all_data[str(cat)] = products

          total = sum(len(v) for v in all_data.values())
          print(f'총 {total}개 수집')

          # 결과 저장
          import os
          os.makedirs('coupang_cache', exist_ok=True)
          with open('coupang_cache/latest.json', 'w', encoding='utf-8') as f:
              json.dump({
                  'fetched_at': datetime.datetime.utcnow().isoformat() + 'Z',
                  'categories': all_data
              }, f, ensure_ascii=False, indent=2)

          print('coupang_cache/latest.json 저장 완료')
          PYEOF

      - name: Add shortenUrl via Deeplink API
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
        run: |
          python3 - << 'PYEOF'
          import hmac, hashlib, urllib.request, json, os, re, sys, time
          from time import gmtime, strftime

          access = os.environ['COUPANG_ACCESS_KEY']
          secret = os.environ['COUPANG_SECRET_KEY']

          DEEPLINK_PATH = '/v2/providers/affiliate_open_api/apis/openapi/deeplink'

          def make_deeplink_auth():
              dt = strftime('%y%m%d', gmtime()) + 'T' + strftime('%H%M%S', gmtime()) + 'Z'
              message = dt + 'POST' + DEEPLINK_PATH
              sig = hmac.new(secret.encode(), message.encode(), hashlib.sha256).hexdigest()
              return f'CEA algorithm=HmacSHA256, access-key={access}, signed-date={dt}, signature={sig}'

          def call_deeplink_api(coupang_urls: list) -> dict:
              """deeplink API 호출. 반환: {originalUrl: shortenUrl}"""
              auth = make_deeplink_auth()
              body = json.dumps({'coupangUrls': coupang_urls}).encode('utf-8')
              req = urllib.request.Request(
                  f'https://api-gateway.coupang.com{DEEPLINK_PATH}',
                  data=body,
                  method='POST',
                  headers={
                      'Authorization': auth,
                      'Content-Type': 'application/json;charset=UTF-8',
                  }
              )
              result = {}
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      resp = json.loads(r.read().decode('utf-8'))
                      if resp.get('rCode') != '0':
                          print(f'  [WARN] deeplink rCode={resp.get("rCode")} msg={resp.get("rMessage","?")}', file=sys.stderr)
                          return result
                      data_list = resp.get('data', [])
                      # 1차: originalUrl 매핑
                      for item in data_list:
                          orig = item.get('originalUrl', '')
                          shorten = item.get('shortenUrl', '')
                          if shorten and 'link.coupang.com/a/' in shorten and orig:
                              result[orig] = shorten
                      # 2차: 순서 기반 fallback
                      for idx, orig_url in enumerate(coupang_urls):
                          if orig_url not in result and idx < len(data_list):
                              shorten = data_list[idx].get('shortenUrl', '')
                              if shorten and 'link.coupang.com/a/' in shorten:
                                  result[orig_url] = shorten
              except Exception as e:
                  print(f'  [ERROR] deeplink API 호출 실패: {e}', file=sys.stderr)
              return result

          def extract_item_ids(url: str):
              """URL에서 itemId, vendorItemId 추출. 없으면 (None, None)"""
              m = re.search(r'itemId=(\d+)', url)
              m2 = re.search(r'vendorItemId=(\d+)', url)
              if m and m2:
                  return m.group(1), m2.group(1)
              return None, None

          # 캐시 로드
          with open('coupang_cache/latest.json', 'r', encoding='utf-8') as f:
              cache_data = json.load(f)

          all_data = cache_data.get('categories', {})

          # 각 상품별로 itemId/vendorItemId 추출 → 완전한 URL 구성
          # (product, complete_url) 목록
          products_to_process = []
          for cat_id, products in all_data.items():
              for p in products:
                  if p.get('shortenUrl') and 'link.coupang.com/a/' in p.get('shortenUrl', ''):
                      continue  # 이미 shortenUrl 있음
                  product_url = p.get('productUrl', '')
                  product_id = str(p.get('productId', ''))
                  item_id, vendor_item_id = extract_item_ids(product_url)
                  if item_id and vendor_item_id and product_id:
                      complete_url = (
                          f'https://www.coupang.com/vp/products/{product_id}'
                          f'?itemId={item_id}&vendorItemId={vendor_item_id}'
                      )
                      products_to_process.append((p, complete_url))

          print(f'deeplink 처리 대상: {len(products_to_process)}개 상품')

          # 10개 배치로 deeplink API 호출
          success_count = 0
          fail_count = 0
          BATCH_SIZE = 10

          for i in range(0, len(products_to_process), BATCH_SIZE):
              batch = products_to_process[i:i + BATCH_SIZE]
              batch_urls = [url for _, url in batch]
              print(f'  배치 {i//BATCH_SIZE + 1}: {len(batch_urls)}개 요청')

              url_to_shorten = call_deeplink_api(batch_urls)

              for p, complete_url in batch:
                  shorten = url_to_shorten.get(complete_url)
                  if shorten and 'link.coupang.com/a/' in shorten:
                      p['shortenUrl'] = shorten
                      success_count += 1
                  else:
                      fail_count += 1

              if i + BATCH_SIZE < len(products_to_process):
                  time.sleep(0.5)

          print(f'\nshortenUrl 결과: 성공={success_count}, 실패={fail_count}')

          # 갱신된 데이터 저장
          import datetime
          cache_data['categories'] = all_data
          cache_data['shorten_updated_at'] = datetime.datetime.utcnow().isoformat() + 'Z'
          with open('coupang_cache/latest.json', 'w', encoding='utf-8') as f:
              json.dump(cache_data, f, ensure_ascii=False, indent=2)

          print('coupang_cache/latest.json shortenUrl 저장 완료')
          PYEOF

      - name: Commit and Push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coupang_cache/
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 스킵"
          else
            git commit -m "chore: coupang cache update $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git push https://x-access-token:$GH_PAT@github.com/noivan0/aikeeper-blog.git main
            echo "✅ Push 완료"
          fi
