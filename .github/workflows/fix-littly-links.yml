name: Fix Littly Links (shortenUrl)

on:
  workflow_dispatch:

jobs:
  convert-deeplinks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Convert AFFSDP URLs to shortenUrl
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
        run: |
          python3 << 'PYEOF'
          import hmac, hashlib, json, os, re, time, urllib.request
          from time import gmtime, strftime

          ACCESS_KEY = os.environ['COUPANG_ACCESS_KEY']
          SECRET_KEY = os.environ['COUPANG_SECRET_KEY']
          DOMAIN = 'https://api-gateway.coupang.com'

          def gen_hmac(method, path):
              dt = strftime('%y%m%d', gmtime()) + 'T' + strftime('%H%M%S', gmtime()) + 'Z'
              msg = dt + method + path
              sig = hmac.new(SECRET_KEY.encode(), msg.encode(), hashlib.sha256).hexdigest()
              return f'CEA algorithm=HmacSHA256, access-key={ACCESS_KEY}, signed-date={dt}, signature={sig}'

          def deeplink_batch(urls):
              path = '/v2/providers/affiliate_open_api/apis/openapi/deeplink'
              auth = gen_hmac('POST', path)
              body = json.dumps({'coupangUrls': urls}).encode()
              req = urllib.request.Request(DOMAIN + path, data=body, method='POST',
                  headers={'Authorization': auth, 'Content-Type': 'application/json;charset=UTF-8'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  raw = r.read()
                  for enc in ('utf-8', 'euc-kr', 'cp949', 'latin-1'):
                      try: return json.loads(raw.decode(enc))
                      except: continue
              return {}

          with open('results/littly_affsdp_map.json') as f:
              affsdp_map = json.load(f)

          print(f'변환 대상: {len(affsdp_map)}개')
          all_keys = list(affsdp_map.keys())
          all_urls = [affsdp_map[k] for k in all_keys]

          key_to_shorten = {}
          for i in range(0, len(all_urls), 10):
              batch_keys = all_keys[i:i+10]
              batch_urls = all_urls[i:i+10]
              try:
                  r = deeplink_batch(batch_urls)
                  for j, d in enumerate(r.get('data', [])):
                      s = d.get('shortenUrl', '')
                      if s:
                          key_to_shorten[batch_keys[j]] = s
                          print(f'  OK: {batch_keys[j]} -> {s}')
                      else:
                          print(f'  SKIP(단종): {batch_keys[j]}')
              except Exception as e:
                  print(f'  배치 실패: {e}')
              if i + 10 < len(all_urls):
                  time.sleep(0.3)

          print(f'\n총 {len(key_to_shorten)}개 변환 완료')
          with open('results/littly_shorten_map.json', 'w') as f:
              json.dump(key_to_shorten, f, ensure_ascii=False, indent=2)
          print('results/littly_shorten_map.json 저장 완료')
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/littly_shorten_map.json
          git diff --staged --quiet || git commit -m "chore: littly shortenUrl 변환 결과 저장"
          git push origin main
