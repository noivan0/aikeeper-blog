name: Fix Littly Links (shortenUrl)

on:
  workflow_dispatch:

jobs:
  fix-littly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: pip install requests

      - name: Fix all Littly AFFSDP links → shortenUrl
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          GGULTONGMON_REFRESH_TOKEN: ${{ secrets.GGULTONGMON_REFRESH_TOKEN }}
          GGULTONGMON_CLIENT_ID: ${{ secrets.GGULTONGMON_CLIENT_ID }}
          GGULTONGMON_CLIENT_SECRET: ${{ secrets.GGULTONGMON_CLIENT_SECRET }}
          LITTLY_EMAIL: ${{ secrets.LITTLY_EMAIL }}
          LITTLY_PASSWORD: ${{ secrets.LITTLY_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import hmac, hashlib, json, os, re, sys, time, urllib.parse, urllib.request
          from time import gmtime, strftime
          import requests

          ACCESS_KEY = os.environ['COUPANG_ACCESS_KEY']
          SECRET_KEY = os.environ['COUPANG_SECRET_KEY']
          DOMAIN = 'https://api-gateway.coupang.com'
          LITTLY_BASE = 'https://api.litt.ly/v0'
          LITTLY_EMAIL = os.environ['LITTLY_EMAIL']
          LITTLY_PASSWORD = os.environ['LITTLY_PASSWORD']

          def gen_hmac(method, path, query=''):
              dt = strftime('%y%m%d', gmtime()) + 'T' + strftime('%H%M%S', gmtime()) + 'Z'
              msg = dt + method + path + query
              sig = hmac.new(SECRET_KEY.encode(), msg.encode(), hashlib.sha256).hexdigest()
              return f'CEA algorithm=HmacSHA256, access-key={ACCESS_KEY}, signed-date={dt}, signature={sig}'

          def deeplink(urls):
              path = '/v2/providers/affiliate_open_api/apis/openapi/deeplink'
              auth = gen_hmac('POST', path)
              body = json.dumps({'coupangUrls': urls}).encode('utf-8')
              req = urllib.request.Request(
                  DOMAIN + path, data=body, method='POST',
                  headers={'Authorization': auth, 'Content-Type': 'application/json;charset=UTF-8'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  raw = r.read()
                  for enc in ('utf-8', 'euc-kr', 'cp949', 'latin-1'):
                      try:
                          return json.loads(raw.decode(enc))
                      except Exception:
                          continue
              return {}

          # 리틀리 로그인
          r = requests.post(f'{LITTLY_BASE}/auth/login',
              json={'email': LITTLY_EMAIL, 'password': LITTLY_PASSWORD}, verify=False)
          token = r.json().get('token', '')
          print(f'리틀리 로그인: {"OK" if token else "FAIL"}')
          headers = {'Authorization': f'Bearer {token}'}

          # 페이지 조회
          r = requests.get(f'{LITTLY_BASE}/page', headers=headers)
          page = r.json()
          page_id = page['id']
          blocks = page.get('data', {}).get('blocks', [])
          print(f'page_id: {page_id}, blocks: {len(blocks)}개')

          # productLink 블록 찾기
          prod_block_idx = None
          prod_block = None
          for i, b in enumerate(blocks):
              if b.get('type') == 'productLink':
                  prod_block_idx = i
                  prod_block = b
                  break

          if prod_block is None:
              print('productLink 블록 없음'); sys.exit(1)

          links = prod_block.get('links', [])
          print(f'상품 수: {len(links)}개')

          # AFFSDP 링크에서 pageKey/itemId/vendorItemId 파싱
          AFFSDP_PAT = re.compile(r'link\.coupang\.com/re/AFFSDP')
          to_fix = []
          skip_no_id = []

          for item in links:
              url = item.get('url', '')
              if 'link.coupang.com/a/' in url:
                  print(f'  SKIP (already shortenUrl): {item["title"][:30]}')
                  continue
              if 'AFFSDP' not in url:
                  print(f'  SKIP (not coupang): {item["title"][:30]}')
                  continue
              params = dict(urllib.parse.parse_qsl(urllib.parse.urlparse(url).query))
              pk = params.get('pageKey', '')
              iid = params.get('itemId', '')
              vid = params.get('vendorItemId', '')
              if pk and iid and vid:
                  to_fix.append((item, pk, iid, vid))
              else:
                  skip_no_id.append(item)
                  print(f'  SKIP (no itemId): {item["title"][:30]}')

          print(f'\n변환 대상: {len(to_fix)}개 / 스킵: {len(skip_no_id)}개\n')

          # deeplink API 배치 변환 (10개씩)
          key_to_shorten = {}
          all_items_urls = [(item, f'https://www.coupang.com/vp/products/{pk}?itemId={iid}&vendorItemId={vid}')
                            for item, pk, iid, vid in to_fix]

          for i in range(0, len(all_items_urls), 10):
              batch = all_items_urls[i:i+10]
              urls = [url for _, url in batch]
              try:
                  r = deeplink(urls)
                  for j, d in enumerate(r.get('data', [])):
                      s = d.get('shortenUrl', '')
                      item_key = batch[j][0]['key']
                      if s:
                          key_to_shorten[item_key] = s
              except Exception as e:
                  print(f'  [WARN] deeplink 배치 실패: {e}')
              if i + 10 < len(all_items_urls):
                  time.sleep(0.3)

          print(f'shortenUrl 획득: {len(key_to_shorten)}개\n')

          # 블록 업데이트
          updated = 0
          for item in links:
              k = item.get('key', '')
              if k in key_to_shorten:
                  old_url = item['url']
                  item['url'] = key_to_shorten[k]
                  updated += 1
                  print(f'  OK: {item["title"][:35]}')
                  print(f'       → {key_to_shorten[k]}')

          print(f'\n업데이트: {updated}개')

          # PATCH 요청
          blocks[prod_block_idx]['links'] = links
          patch_data = {'data': page['data']}
          r = requests.patch(f'{LITTLY_BASE}/page/{page_id}',
              json=patch_data, headers=headers)
          print(f'PATCH 응답: {r.status_code}')
          if r.status_code == 200:
              print('✅ 리틀리 링크 업데이트 완료')
          else:
              print(f'❌ 실패: {r.text[:200]}')
          PYEOF

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "chore: littly link fix log"
          git push origin main || true
