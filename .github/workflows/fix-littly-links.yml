name: Fix Littly Links (shortenUrl)

on:
  workflow_dispatch:

jobs:
  fix-littly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: pip install requests

      - name: Fix Littly product links → shortenUrl
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          LITTLY_EMAIL: ${{ secrets.LITTLY_EMAIL }}
          LITTLY_PASSWORD: ${{ secrets.LITTLY_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import hmac, hashlib, json, os, re, time, urllib.parse, urllib.request
          from time import gmtime, strftime
          import requests

          ACCESS_KEY = os.environ['COUPANG_ACCESS_KEY']
          SECRET_KEY = os.environ['COUPANG_SECRET_KEY']
          DOMAIN = 'https://api-gateway.coupang.com'
          LITTLY_BASE = 'https://api.litt.ly/v0'

          def gen_hmac(method, path, query=''):
              dt = strftime('%y%m%d', gmtime()) + 'T' + strftime('%H%M%S', gmtime()) + 'Z'
              msg = dt + method + path + query
              sig = hmac.new(SECRET_KEY.encode(), msg.encode(), hashlib.sha256).hexdigest()
              return f'CEA algorithm=HmacSHA256, access-key={ACCESS_KEY}, signed-date={dt}, signature={sig}'

          def deeplink_batch(urls):
              path = '/v2/providers/affiliate_open_api/apis/openapi/deeplink'
              auth = gen_hmac('POST', path)
              body = json.dumps({'coupangUrls': urls}).encode('utf-8')
              req = urllib.request.Request(
                  DOMAIN + path, data=body, method='POST',
                  headers={'Authorization': auth, 'Content-Type': 'application/json;charset=UTF-8'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  raw = r.read()
                  for enc in ('utf-8', 'euc-kr', 'cp949', 'latin-1'):
                      try: return json.loads(raw.decode(enc))
                      except: continue
              return {}

          # 리틀리 로그인
          email = os.environ['LITTLY_EMAIL']
          pw = os.environ['LITTLY_PASSWORD']
          r = requests.post(f'{LITTLY_BASE}/auth/login', json={'email': email, 'password': pw}, verify=False, timeout=10)
          token = r.json().get('token','')
          print(f'리틀리 로그인: {"OK" if token else "FAIL"}')
          headers = {'Authorization': f'Bearer {token}'}

          # 페이지 조회
          r = requests.get(f'{LITTLY_BASE}/page', headers=headers, verify=False, timeout=10)
          page = r.json()
          page_id = page.get('id')
          blocks = page.get('data', {}).get('blocks', [])
          print(f'page_id: {page_id}, blocks: {len(blocks)}')

          # productLink 블록 찾기
          pl_block = None
          for b in blocks:
              if b.get('type') == 'productLink':
                  pl_block = b
                  break

          if not pl_block:
              print('productLink 블록 없음'); exit(1)

          links = pl_block.get('links', [])
          print(f'상품 총 {len(links)}개')

          # AFFSDP → shortenUrl 교체
          affsdp_items = []
          for item in links:
              url = item.get('url','')
              if 'AFFSDP' in url:
                  m_pk = re.search(r'pageKey=(\d+)', url)
                  m_iid = re.search(r'itemId=(\d+)', url)
                  m_vid = re.search(r'vendorItemId=(\d+)', url)
                  pk = m_pk.group(1) if m_pk else ''
                  iid = m_iid.group(1) if m_iid else ''
                  vid = m_vid.group(1) if m_vid else ''
                  if pk and iid and vid:
                      affsdp_items.append({
                          'item': item,
                          'coupang_url': f'https://www.coupang.com/vp/products/{pk}?itemId={iid}&vendorItemId={vid}'
                      })

          print(f'교체 대상: {len(affsdp_items)}개')

          # deeplink 배치 변환 (10개씩)
          url_to_shorten = {}
          all_urls = [x['coupang_url'] for x in affsdp_items]
          for i in range(0, len(all_urls), 10):
              batch = all_urls[i:i+10]
              try:
                  r2 = deeplink_batch(batch)
                  for j, d in enumerate(r2.get('data', [])):
                      s = d.get('shortenUrl','')
                      if s:
                          url_to_shorten[batch[j]] = s
                          print(f'  OK: {batch[j][-40:]} → {s}')
                      else:
                          print(f'  SKIP(단종): {batch[j][-40:]}')
              except Exception as e:
                  print(f'  배치 실패: {e}')
              if i + 10 < len(all_urls):
                  time.sleep(0.5)

          print(f'\nshortenUrl 획득: {len(url_to_shorten)}개')

          # links 업데이트
          changed = 0
          for x in affsdp_items:
              shorten = url_to_shorten.get(x['coupang_url'])
              if shorten:
                  x['item']['url'] = shorten
                  changed += 1

          print(f'교체 완료: {changed}개')

          # PATCH 저장
          patch_data = {'data': page.get('data', {})}
          r3 = requests.patch(
              f'{LITTLY_BASE}/page/{page_id}',
              json=patch_data, headers=headers, verify=False, timeout=30
          )
          print(f'PATCH 결과: {r3.status_code}')
          if r3.status_code not in (200, 201, 204):
              print(f'응답: {r3.text[:300]}')
          else:
              print('✅ 리틀리 업데이트 완료')
          PYEOF

      - name: Save results
        run: |
          echo "completed at $(date -u)" > results/fix_littly_log.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/fix_littly_log.txt
          git diff --staged --quiet || git commit -m "chore: fix littly links log"
          git push origin main
