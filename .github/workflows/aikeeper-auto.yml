name: AI Auto Post to Blogger

on:
  schedule:
    # UTC 기준 (KST = UTC+9) — 하루 2회 (품질 집중 전략)
    # KST: 09:00, 19:00
    - cron: '0  0  * * *'   # KST 09:00
    - cron: '0  10 * * *'   # KST 19:00
  workflow_dispatch:
    inputs:
      topic:
        description: 'Blog topic (empty = auto)'
        required: false
        default: ''
      keywords:
        description: 'Keywords (comma separated)'
        required: false
        default: ''
      skip_delay:
        description: 'Skip random delay (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  auto-post:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
      BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
      BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # aikeeper 블로그 설정 (internal_links.py TARGET_BLOG_ID 자동 전달)
      TARGET_BLOG_ID: "3598676904202320050"
      TARGET_BLOG_URL: "https://aikeeper.allsweep.xyz"
      TARGET_BLOG_NAME: "AI키퍼"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt -q

      - name: Weekly angle refresh
        run: |
          WEEKDAY=$(date +%u)
          YEAR_WW=$(date +%Y-W%V)
          ANGLE_FILE="output/angles/topic_angles_${YEAR_WW}.json"
          if [ "$WEEKDAY" = "1" ] || [ ! -f "$ANGLE_FILE" ]; then
            python3 scripts/angle_refresher.py || echo "angle refresh failed (non-fatal)"
          else
            echo "angle refresh skipped (file exists: $ANGLE_FILE)"
          fi

      - name: Random delay
        if: github.event.inputs.skip_delay != 'true'
        run: |
          python3 -c "
          import random, time, datetime
          delay = random.randint(0, 55 * 60)
          print(f'delay: {delay//60}m {delay%60}s')
          time.sleep(delay)
          print('done')
          "

      - name: Find or use topic
        id: topic
        run: python3 scripts/ci_find_topic.py "${{ github.event.inputs.topic }}" "${{ github.event.inputs.keywords }}"

      - name: Generate post
        id: gen
        run: python3 scripts/ci_generate.py "${{ steps.topic.outputs.topic }}" "${{ steps.topic.outputs.keywords }}" "${{ steps.topic.outputs.angle }}"

      - name: Add images
        continue-on-error: true
        run: python3 scripts/add_images.py "${{ steps.gen.outputs.file }}" || true

      - name: Post to Blogger
        run: python3 scripts/post_to_blogger.py "${{ steps.gen.outputs.file }}"

      - name: Request Google Indexing
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -c "
          import urllib.request, re, sys, os
          sys.path.insert(0, 'scripts')
          try:
              import indexing_api as idx
              token = idx.get_indexing_token()
              with urllib.request.urlopen('https://aikeeper.allsweep.xyz/atom.xml', timeout=10) as r:
                  content = r.read().decode()
              urls = re.findall(r\"<link rel='alternate' type='text/html' href='(https://aikeeper\.allsweep\.xyz/\d{4}/[^']+)'\", content)
              for url in urls[:5]:
                  result = idx.request_indexing(url, token)
                  print(f'  OK: {url[:60]}' if 'error' not in result else f'  WARN: {url[:60]}')
              print(f'done: {min(5, len(urls))} urls')
          except Exception as e:
              print(f'indexing skipped (non-fatal): {e}')
          "

      - name: Commit post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet || git commit -m "auto: post $(date +'%Y-%m-%d %H:%M KST')"
          git push || true

      - name: Deploy RSS and sitemap
        continue-on-error: true
        run: |
          python3 scripts/generate_rss.py /tmp/rss.xml
          python3 scripts/generate_sitemap.py /tmp/sitemap.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git checkout gh-pages
          cp /tmp/rss.xml rss.xml
          cp /tmp/sitemap.xml sitemap.xml
          git add rss.xml sitemap.xml
          git diff --staged --quiet || git commit -m "chore: rss/sitemap $(date +'%Y-%m-%d %H:%M KST')"
          git push origin gh-pages || true
          git checkout main

      - name: GSC weekly report (Monday only)
        if: format('{0}', github.event.schedule) == '0 22 * * 0' || github.event.inputs.skip_delay == 'gsc'
        continue-on-error: true
        run: |
          python3 scripts/gsc_report.py || echo "gsc report failed (non-fatal)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/reports/ || true
          git diff --staged --quiet || git commit -m "report: gsc weekly $(date +'%Y-W%V')"
          git push || true
