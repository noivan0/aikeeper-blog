name: AI Auto Post to Blogger

# ── 스케줄 전략 ──────────────────────────────────────────────────
# 하루 7~8번 트리거 → 각 실행 시 랜덤 딜레이(0~55분) 적용
# → 실제 포스팅 시각이 매일 달라짐 (자연스러운 사람 패턴)
#
# KST 기준 트리거 시각 (UTC):
#   00:30 (KST 09:30) / 02:00 (KST 11:00) / 03:30 (KST 12:30)
#   05:00 (KST 14:00) / 06:30 (KST 15:30) / 08:00 (KST 17:00)
#   10:00 (KST 19:00) / 12:30 (KST 21:30)
# → 랜덤 딜레이 후 실제 포스팅 → 하루 5~8개 자연스러운 간격

on:
  schedule:
    - cron: '30 0 * * *'    # KST 09:30
    - cron: '0 2 * * *'     # KST 11:00
    - cron: '30 3 * * *'    # KST 12:30
    - cron: '0 5 * * *'     # KST 14:00
    - cron: '30 6 * * *'    # KST 15:30
    - cron: '0 8 * * *'     # KST 17:00
    - cron: '0 10 * * *'    # KST 19:00
    - cron: '30 12 * * *'   # KST 21:30
  workflow_dispatch:
    inputs:
      topic:
        description: '블로그 주제 (비워두면 자동 발굴)'
        required: false
        default: ''
      keywords:
        description: '키워드 (쉼표 구분)'
        required: false
        default: ''
      skip_delay:
        description: '랜덤 딜레이 스킵 (테스트용)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: self-hosted

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
      BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
      BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt -q

      - name: Weekly angle refresh (Monday or missing)
        run: |
          WEEKDAY=$(date +%u)
          YEAR_WW=$(date +%Y-W%V)
          ANGLE_FILE="output/angles/topic_angles_${YEAR_WW}.json"
          if [ "$WEEKDAY" = "1" ] || [ ! -f "$ANGLE_FILE" ]; then
            echo "앵글 갱신 실행 (요일=$WEEKDAY)"
            python3 scripts/angle_refresher.py || echo "앵글 갱신 실패 (비치명적, 계속 진행)"
          else
            echo "앵글 갱신 스킵 (파일 존재: $ANGLE_FILE)"
          fi

      # ── 랜덤 딜레이 (구글 자동화 탐지 우회) ──────────────────
      # workflow_dispatch + skip_delay=true면 즉시 실행
      - name: Random delay (human-like posting pattern)
        if: github.event.inputs.skip_delay != 'true'
        run: |
          python3 -c "
          import random, time, datetime
          # 0~55분 랜덤 대기 (schedule 실행 시에만)
          delay = random.randint(0, 55 * 60)
          mins = delay // 60
          secs = delay % 60
          now = datetime.datetime.utcnow()
          wake = now + datetime.timedelta(seconds=delay)
          print(f'⏱  랜덤 딜레이: {mins}분 {secs}초 후 포스팅')
          print(f'   예상 포스팅 시각: {wake.strftime(\"%H:%M UTC\")} ({wake.hour+9 if wake.hour+9<24 else wake.hour+9-24:02d}:{wake.minute:02d} KST)')
          time.sleep(delay)
          print('⏰ 딜레이 완료 — 포스팅 시작')
          "

      - name: Find or use topic
        id: topic
        run: python3 scripts/ci_find_topic.py "${{ github.event.inputs.topic }}" "${{ github.event.inputs.keywords }}"

      - name: Generate post
        id: gen
        run: python3 scripts/ci_generate.py "${{ steps.topic.outputs.topic }}" "${{ steps.topic.outputs.keywords }}" "${{ steps.topic.outputs.angle }}"

      - name: Add images
        continue-on-error: true
        run: python3 scripts/add_images.py "${{ steps.gen.outputs.file }}" || true

      - name: Post to Blogger
        run: python3 scripts/post_to_blogger.py "${{ steps.gen.outputs.file }}"

      - name: Commit post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet || git commit -m "auto: AI 포스트 $(date +'%Y-%m-%d %H:%M KST')"
          git push || true
