name: AI Auto Post to Blogger (AI키퍼)

on:
  # 매일 오전 9시, 오후 3시 자동 실행 (KST = UTC+9)
  schedule:
    - cron: '0 0 * * *'   # KST 09:00
    - cron: '0 6 * * *'   # KST 15:00
  # 수동 실행 (주제 직접 입력 가능)
  workflow_dispatch:
    inputs:
      topic:
        description: '블로그 주제 (비워두면 자동 발굴)'
        required: false
        default: ''
      keywords:
        description: '키워드 (쉼표 구분, 비워두면 자동)'
        required: false
        default: ''
  # posts/ 폴더에 직접 .md 추가 시
  push:
    branches: [main]
    paths:
      - 'posts/**.md'

jobs:
  # ── Job 1: AI 자동 포스팅 (스케줄 or 수동) ──
  auto-post:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 주제 결정: 입력값 있으면 사용, 없으면 자동 발굴
      - name: Find or use topic
        id: topic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          MANUAL_TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$MANUAL_TOPIC" ]; then
            echo "📌 수동 입력 주제: $MANUAL_TOPIC"
            echo "topic=$MANUAL_TOPIC" >> $GITHUB_OUTPUT
            echo "keywords=${{ github.event.inputs.keywords }}" >> $GITHUB_OUTPUT
          else
            echo "🔍 트렌드 기반 주제 자동 발굴..."
            OUTPUT=$(python scripts/find_topics.py)
            echo "$OUTPUT"
            TOPIC=$(echo "$OUTPUT" | grep "^TOPIC:" | sed 's/^TOPIC://')
            KEYWORDS=$(echo "$OUTPUT" | grep "^KEYWORDS:" | sed 's/^KEYWORDS://')
            ANGLE=$(echo "$OUTPUT" | grep "^ANGLE:" | sed 's/^ANGLE://')
            echo "topic=$TOPIC" >> $GITHUB_OUTPUT
            echo "keywords=$KEYWORDS" >> $GITHUB_OUTPUT
            echo "angle=$ANGLE" >> $GITHUB_OUTPUT
          fi

      - name: Generate post with Claude
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          FILE=$(python scripts/generate_post.py "${{ steps.topic.outputs.topic }}" "${{ steps.topic.outputs.keywords }}" "${{ steps.topic.outputs.angle }}" | tail -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "생성된 파일: $FILE"

      - name: Add images
        continue-on-error: true
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          if [ -z "$UNSPLASH_ACCESS_KEY" ]; then
            echo "⚠️  UNSPLASH_ACCESS_KEY 없음 — 이미지 삽입 스킵"
            exit 0
          fi
          python scripts/add_images.py "${{ steps.gen.outputs.file }}" || echo "이미지 삽입 실패 — 계속 진행"

      - name: Post to Blogger
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: |
          echo "CLIENT_ID 길이: ${#BLOGGER_CLIENT_ID}"
          echo "REFRESH_TOKEN 길이: ${#BLOGGER_REFRESH_TOKEN}"
          echo "CLIENT_SECRET 길이: ${#BLOGGER_CLIENT_SECRET}"
          python -c "
import os, json
from google.oauth2.credentials import Credentials
from google.auth.transport.requests import Request
creds = Credentials(
    token=None,
    refresh_token=os.environ['BLOGGER_REFRESH_TOKEN'],
    client_id=os.environ['BLOGGER_CLIENT_ID'],
    client_secret=os.environ['BLOGGER_CLIENT_SECRET'],
    token_uri='https://oauth2.googleapis.com/token',
    scopes=['https://www.googleapis.com/auth/blogger']
)
creds.refresh(Request())
print('토큰 갱신 성공:', creds.valid)
"
          python scripts/post_to_blogger.py "${{ steps.gen.outputs.file }}"

      - name: Commit generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet || git commit -m "auto: 트렌드 기반 AI 포스트 자동 생성 $(date +'%Y-%m-%d %H:%M')"
          git push

  # ── Job 2: 수동 .md push 시 포스팅 ──
  manual-post:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get new markdown files
        run: |
          # fetch-depth:2 로 이전 커밋이 없을 경우 대비
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'posts/*.md' > changed_files.txt
          else
            # 첫 커밋인 경우 전체 posts/ 파일 대상
            git show --name-only --diff-filter=A HEAD -- 'posts/*.md' | grep '\.md$' > changed_files.txt
          fi
          echo "대상 파일:"
          cat changed_files.txt

      - name: Add images & Post
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          count=0
          while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "🖼️  이미지 삽입: $file"
              python scripts/add_images.py "$file" || true
              echo "📝 포스팅: $file"
              python scripts/post_to_blogger.py "$file"
              count=$((count+1))
            fi
          done < changed_files.txt
          echo "총 ${count}개 포스팅 완료"
          [ $count -eq 0 ] && echo "포스팅할 새 파일 없음 (정상)" && exit 0
