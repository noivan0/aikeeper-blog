name: Fix Coupang Links (shortenUrl)

on:
  workflow_dispatch:

jobs:
  fix-links:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Fix all AFFSDP links -> shortenUrl
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          GGULTONGMON_REFRESH_TOKEN: ${{ secrets.GGULTONGMON_REFRESH_TOKEN }}
          GGULTONGMON_CLIENT_ID: ${{ secrets.GGULTONGMON_CLIENT_ID }}
          GGULTONGMON_CLIENT_SECRET: ${{ secrets.GGULTONGMON_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import hmac, hashlib, json, os, re, sys, time, urllib.parse, urllib.request
          from time import gmtime, strftime

          import google.oauth2.credentials
          import googleapiclient.discovery

          ACCESS_KEY = os.environ['COUPANG_ACCESS_KEY']
          SECRET_KEY = os.environ['COUPANG_SECRET_KEY']
          BLOG_ID = '4422596386410826373'
          DOMAIN = 'https://api-gateway.coupang.com'

          # Blogger
          creds = google.oauth2.credentials.Credentials(
              token=None,
              refresh_token=os.environ['GGULTONGMON_REFRESH_TOKEN'],
              client_id=os.environ['GGULTONGMON_CLIENT_ID'],
              client_secret=os.environ['GGULTONGMON_CLIENT_SECRET'],
              token_uri='https://oauth2.googleapis.com/token'
          )
          service = googleapiclient.discovery.build('blogger', 'v3', credentials=creds)

          AFFSDP_PAT = re.compile(r'https://link\.coupang\.com/re/AFFSDP\?[^\s"<]+')

          def gen_hmac(method, path, query=''):
              dt = strftime('%y%m%d', gmtime()) + 'T' + strftime('%H%M%S', gmtime()) + 'Z'
              msg = dt + method + path + query
              sig = hmac.new(SECRET_KEY.encode(), msg.encode(), hashlib.sha256).hexdigest()
              return f'CEA algorithm=HmacSHA256, access-key={ACCESS_KEY}, signed-date={dt}, signature={sig}'

          def deeplink_batch(urls):
              """urls -> {url: shortenUrl} 딕셔너리. 순서 기반 + landingUrl 기반 이중 매핑."""
              if not urls:
                  return {}
              path = '/v2/providers/affiliate_open_api/apis/openapi/deeplink'
              auth = gen_hmac('POST', path)
              body = json.dumps({'coupangUrls': urls}).encode('utf-8')
              req = urllib.request.Request(
                  DOMAIN + path, data=body, method='POST',
                  headers={'Authorization': auth, 'Content-Type': 'application/json;charset=UTF-8'}
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      raw = r.read()
                      http_code = r.status
              except urllib.error.HTTPError as e:
                  raw = e.read()
                  http_code = e.code
                  print(f'    [HTTP {http_code}] {raw[:300]}', flush=True)
                  return {}
              except Exception as e:
                  print(f'    [HTTP ERR] {e}', flush=True)
                  return {}
              for enc in ('utf-8', 'euc-kr', 'cp949', 'latin-1'):
                  try:
                      resp = json.loads(raw.decode(enc))
                      print(f'    [RAW RESP {http_code}] {json.dumps(resp)[:300]}', flush=True)
                      break
                  except Exception:
                      continue
              else:
                  print(f'    [DECODE ERR] {raw[:300]}', flush=True)
                  return {}

              data = resp.get('data', [])
              result = {}
              # 1차: landingUrl 기반 매핑
              for item in data:
                  landing = item.get('landingUrl', '')
                  shorten = item.get('shortenUrl', '')
                  if shorten and landing:
                      result[landing] = shorten
              # 2차: 순서 기반 매핑 (landingUrl != 입력 URL인 경우 fallback)
              for i, url in enumerate(urls):
                  if url not in result and i < len(data):
                      shorten = data[i].get('shortenUrl', '')
                      if shorten:
                          result[url] = shorten
              return result

          def get_all_posts():
              posts, token, page = [], None, 0
              while True:
                  kwargs = dict(blogId=BLOG_ID, maxResults=50, fetchBodies=True)
                  if token: kwargs['pageToken'] = token
                  r = service.posts().list(**kwargs).execute()
                  posts.extend(r.get('items', []))
                  token = r.get('nextPageToken')
                  page += 1
                  print(f'  p{page}: {len(posts)}개', flush=True)
                  if not token: break
                  time.sleep(0.3)
              return posts

          def parse_affsdp_urls(content):
              """AFFSDP URL 목록 파싱. 중복 제거, 원본 URL -> coupang product URL 매핑 반환."""
              affsdp_to_product = {}
              for raw in AFFSDP_PAT.findall(content):
                  url = raw.replace('&amp;', '&').split('"')[0].split("'")[0].rstrip(');,')
                  if url in affsdp_to_product:
                      continue
                  params = dict(urllib.parse.parse_qsl(urllib.parse.urlparse(url).query))
                  pk = params.get('pageKey', '')
                  iid = params.get('itemId', '')
                  vid = params.get('vendorItemId', '')
                  if pk and iid and vid:
                      product_url = f'https://www.coupang.com/vp/products/{pk}?itemId={iid}&vendorItemId={vid}'
                  elif pk:
                      product_url = f'https://www.coupang.com/vp/products/{pk}'
                  else:
                      continue
                  affsdp_to_product[url] = product_url
              return affsdp_to_product

          def fix_content(content, affsdp_to_shorten):
              def rep(m):
                  raw = m.group(0)
                  url = raw.replace('&amp;', '&').split('"')[0].split("'")[0].rstrip(');,')
                  return affsdp_to_shorten.get(url, raw)
              return AFFSDP_PAT.sub(rep, content)

          print('전체 포스팅 수집 중...', flush=True)
          all_posts = get_all_posts()
          print(f'총 {len(all_posts)}개\n', flush=True)

          to_fix = []
          for p in all_posts:
              content = p.get('content', '')
              if 'link.coupang.com/re/AFFSDP' in content:
                  mapping = parse_affsdp_urls(content)
                  if mapping:
                      to_fix.append({
                          'id': p['id'],
                          'title': p['title'],
                          'content': content,
                          'mapping': mapping  # {affsdp_url: product_url}
                      })

          print(f'수정 대상: {len(to_fix)}개\n', flush=True)
          ok, skip, fail = 0, 0, 0
          results = []

          for idx, post in enumerate(to_fix):
              pid = post['id']
              title = post['title'][:50]
              mapping = post['mapping']   # affsdp_url -> product_url
              affsdp_urls = list(mapping.keys())
              product_urls = list(mapping.values())

              # product_url 중복 제거하여 deeplink API 호출
              unique_product_urls = list(dict.fromkeys(product_urls))
              product_to_shorten = {}
              for i in range(0, len(unique_product_urls), 10):
                  batch = unique_product_urls[i:i+10]
                  print(f'    deeplink 요청: {batch}', flush=True)
                  r = deeplink_batch(batch)
                  print(f'    deeplink 응답: {r}', flush=True)
                  product_to_shorten.update(r)
                  if i + 10 < len(unique_product_urls):
                      time.sleep(0.4)

              # affsdp_url -> shorten 매핑
              affsdp_to_shorten = {}
              for aurl, purl in mapping.items():
                  s = product_to_shorten.get(purl, '')
                  if s:
                      affsdp_to_shorten[aurl] = s

              if not affsdp_to_shorten:
                  print(f'  [{idx+1}/{len(to_fix)}] SKIP(deeplink 없음): {title}', flush=True)
                  skip += 1
                  results.append({'id': pid, 'title': title, 'status': 'skip'})
                  continue

              new_content = fix_content(post['content'], affsdp_to_shorten)
              remaining = len(AFFSDP_PAT.findall(new_content))
              try:
                  service.posts().patch(blogId=BLOG_ID, postId=pid, body={'content': new_content}).execute()
                  ok += 1
                  print(f'  [{idx+1}/{len(to_fix)}] OK: {title} | {len(affsdp_to_shorten)}/{len(affsdp_urls)}개 | 잔여:{remaining}', flush=True)
                  results.append({'id': pid, 'title': title, 'status': 'ok',
                                  'fixed': len(affsdp_to_shorten), 'remaining': remaining})
              except Exception as e:
                  fail += 1
                  print(f'  [{idx+1}/{len(to_fix)}] FAIL: {title} | {e}', flush=True)
                  results.append({'id': pid, 'title': title, 'status': 'fail', 'error': str(e)})
              time.sleep(1.2)

          print(f'\n=== 완료 ===', flush=True)
          print(f'성공: {ok} | 스킵: {skip} | 실패: {fail}', flush=True)

          os.makedirs('results', exist_ok=True)
          with open('results/fix_links_log.jsonl', 'w') as f:
              for r in results:
                  f.write(json.dumps(r, ensure_ascii=False) + '\n')
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/fix_links_log.jsonl
          git diff --staged --quiet || git commit -m "chore: fix coupang links log $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push origin main
