name: Crawl Coupang Deeplink Docs
on:
  workflow_dispatch: {}
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install
        run: pip install playwright && python -m playwright install chromium --with-deps
      - name: Crawl Deeplink + Rate Limit
        run: |
          python3 - << 'PYEOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  
                  # deeplink API 문서 페이지
                  urls = [
                      "https://partners.coupang.com/#help/open-api/api/deeplink",
                      "https://partners.coupang.com/#help/open-api/api/deeplink-v2",
                      "https://partners.coupang.com/#help/open-api",
                  ]
                  
                  for url in urls:
                      try:
                          await page.goto(url, timeout=20000)
                          await page.wait_for_timeout(4000)
                          txt = await page.inner_text("body")
                          print(f"\n=== URL: {url} ===")
                          print(f"길이: {len(txt)}자")
                          # rate limit, 제한, limit 관련 내용 찾기
                          lines = txt.split('\n')
                          for i, l in enumerate(lines):
                              if any(k in l.lower() for k in ['rate', 'limit', '제한', '횟수', '초과', '분당', '시간당', 'quota', 'throttle', '100']):
                                  start = max(0, i-2)
                                  end = min(len(lines), i+5)
                                  context = '\n'.join(lines[start:end])
                                  print(f"\n[RATE LIMIT 관련]\n{context}")
                          print(txt[:6000])
                      except Exception as e:
                          print(f"FAIL {url}: {e}")
                  
                  await browser.close()
          
          asyncio.run(main())
          PYEOF
