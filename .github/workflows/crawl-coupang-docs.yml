name: Crawl Coupang API Docs

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install playwright && playwright install chromium

      - name: Crawl Coupang Partners API Docs
        run: |
          python3 - << 'PYEOF'
          import asyncio, json
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  
                  print("=== 쿠팡 파트너스 API 문서 크롤링 ===")
                  await page.goto("https://partners.coupang.com/#help/open-api", timeout=30000)
                  await page.wait_for_timeout(5000)
                  
                  text = await page.evaluate("() => document.body.innerText")
                  print(f"페이지 길이: {len(text)}자")
                  
                  # API 섹션 찾기
                  lines = text.split('\n')
                  for i, line in enumerate(lines):
                      if any(k in line.lower() for k in ['deeplink','rate','limit','quota','횟수','한도','초과']):
                          print(f"L{i}: {line[:200]}")
                  
                  # 전체 텍스트 저장
                  with open('api_docs.txt', 'w') as f:
                      f.write(text)
                  print("저장 완료")
                  await browser.close()

          asyncio.run(main())
          PYEOF

      - name: Upload docs
        run: cat api_docs.txt | head -500
