name: Crawl Coupang Partners API Docs
on:
  workflow_dispatch: {}
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Playwright
        run: pip install playwright && python -m playwright install chromium --with-deps
      - name: Crawl API Docs
        run: |
          python3 - << 'PYEOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  await page.goto("https://partners.coupang.com/#help/open-api", timeout=30000)
                  await page.wait_for_timeout(5000)
                  
                  txt = await page.inner_text("body")
                  print("=== MAIN PAGE ===")
                  print(txt[:3000])
                  
                  # deeplink 탭 클릭
                  links = await page.query_selector_all("a, button, li")
                  for l in links:
                      t = await l.inner_text()
                      if "deeplink" in t.lower() or "shorten" in t.lower():
                          print(f"FOUND: {t.strip()}")
                          await l.click()
                          await page.wait_for_timeout(2000)
                          sub_txt = await page.inner_text("body")
                          print("=== DEEPLINK PAGE ===")
                          print(sub_txt[:5000])
                          break
                  
                  await browser.close()

          asyncio.run(main())
          PYEOF
      - name: Save results
        run: |
          echo "완료" >> results/api_docs_crawl.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ || true
          git diff --staged --quiet || git commit -m "chore: coupang api docs crawl result"
          git push origin main || true
