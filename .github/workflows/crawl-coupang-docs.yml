name: Crawl Coupang Full API Docs
on:
  workflow_dispatch: {}
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install
        run: pip install playwright && python -m playwright install chromium --with-deps
      - name: Crawl Full API Docs
        run: |
          python3 - << 'PYEOF'
          import asyncio, json
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  
                  # 메인 페이지
                  await page.goto("https://partners.coupang.com/#help/open-api", timeout=30000)
                  await page.wait_for_timeout(5000)
                  
                  # 사이드 메뉴 모든 링크 수집
                  links = await page.query_selector_all("a[href]")
                  menu_links = []
                  for l in links:
                      href = await l.get_attribute("href") or ""
                      text = (await l.inner_text()).strip()
                      if href and ("#help" in href or "api" in href.lower()):
                          menu_links.append((text, href))
                  
                  print("=== 메뉴 링크 전체 ===")
                  for t, h in menu_links:
                      print(f"  [{t}] {h}")
                  
                  # 각 하위 페이지 방문
                  base = "https://partners.coupang.com"
                  visited_pages = {}
                  
                  for text, href in menu_links:
                      if not href.startswith("http"):
                          url = base + href
                      else:
                          url = href
                      
                      if url in visited_pages:
                          continue
                          
                      try:
                          await page.goto(url, timeout=20000)
                          await page.wait_for_timeout(3000)
                          content = await page.inner_text("body")
                          visited_pages[url] = content
                          print(f"\n=== PAGE: {text} ({url}) ===")
                          print(content[:4000])
                          print("---END---")
                      except Exception as e:
                          print(f"SKIP {url}: {e}")
                  
                  await browser.close()

          asyncio.run(main())
          PYEOF
