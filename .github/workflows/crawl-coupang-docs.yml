name: Crawl Coupang Partners API Docs
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install Playwright
        run: pip install playwright && python -m playwright install chromium --with-deps 2>/dev/null

      - name: Crawl Partners API Docs
        run: |
          python3 << 'PYEOF'
          from playwright.sync_api import sync_playwright
          import json, os, re, time

          results = {}
          BASE = "https://partners.coupang.com"
          
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              ctx = browser.new_context(viewport={"width":1280,"height":900})
              page = ctx.new_page()
              
              # 메인 페이지 로드
              page.goto(f"{BASE}/#help/open-api", timeout=30000)
              page.wait_for_load_state("networkidle")
              time.sleep(5)
              
              # 로그인 체크 (비로그인이어도 문서는 볼 수 있음)
              title = page.title()
              print(f"페이지 제목: {title}")
              
              # 전체 텍스트
              body = page.evaluate("document.body.innerText")
              results["메인_오픈API"] = body[:8000]
              print(f"메인페이지 텍스트 {len(body)}자")
              print(body[:3000])
              
              # 딥링크 페이지
              page.goto(f"{BASE}/#help/open-api/api/deeplink", timeout=20000)
              page.wait_for_load_state("networkidle")
              time.sleep(3)
              body2 = page.evaluate("document.body.innerText")
              results["딥링크_API"] = body2[:8000]
              print("\n\n=== 딥링크 API 페이지 ===")
              print(body2[:3000])
              
              # FAQ
              page.goto(f"{BASE}/#help/open-api/faq", timeout=20000)
              page.wait_for_load_state("networkidle")
              time.sleep(3)
              body3 = page.evaluate("document.body.innerText")
              results["FAQ"] = body3[:8000]
              print("\n\n=== FAQ 페이지 ===")
              print(body3[:3000])
              
              browser.close()
          
          os.makedirs("coupang_api_docs", exist_ok=True)
          with open("coupang_api_docs/api_reference.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          print("\n\n저장 완료")
          PYEOF

      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coupang_api_docs/
          git diff --staged --quiet || git commit -m "docs: coupang partners API docs crawled"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/noivan0/aikeeper-blog.git main || echo "push 실패 (변경없음)"
