name: Crawl Coupang API Docs

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Install playwright
        run: pip install playwright requests && playwright install chromium --with-deps

      - name: Research UGC AI Video Tools
        run: |
          python3 - << 'PYEOF'
          import asyncio, requests, re, json
          from playwright.async_api import async_playwright

          TOOLS = {
              "Kling AI": "https://klingai.com/pricing",
              "Luma Dream Machine": "https://lumalabs.ai/dream-machine",
              "Pika Labs": "https://pika.art",
              "Runway ML": "https://runwayml.com/pricing",
              "HeyGen": "https://www.heygen.com/pricing",
              "Synthesia": "https://www.synthesia.io/pricing",
              "CapCut AI": "https://www.capcut.com/tools/ai-video-generator",
              "InVideo AI": "https://invideo.io/pricing/",
              "Canva AI Video": "https://www.canva.com/features/ai-video-generator/",
              "D-ID": "https://www.d-id.com/pricing/",
              "Hedra": "https://www.hedra.com/pricing",
              "Steve AI": "https://www.steve.ai/pricing",
              "Veed.io": "https://www.veed.io/pricing",
              "Pictory": "https://pictory.ai/pricing",
              "Descript": "https://www.descript.com/pricing",
          }

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()

                  results = {}
                  for name, url in TOOLS.items():
                      try:
                          await page.goto(url, timeout=20000, wait_until='domcontentloaded')
                          await page.wait_for_timeout(3000)
                          text = await page.evaluate("() => document.body.innerText")
                          
                          # 무료 플랜 정보 추출
                          free_lines = []
                          for line in text.split('\n'):
                              line = line.strip()
                              if line and any(k in line.lower() for k in [
                                  'free', 'starter', '$0', 'no credit', 'trial',
                                  'per month', 'credits', 'videos per', 'generate'
                              ]) and len(line) < 200:
                                  free_lines.append(line)
                          
                          results[name] = {
                              'url': url,
                              'free_plan': free_lines[:8]
                          }
                          print(f"\n=== {name} ===")
                          for l in free_lines[:6]:
                              print(f"  {l}")
                      except Exception as e:
                          print(f"=== {name}: ERROR {e} ===")
                          results[name] = {'url': url, 'error': str(e)}

                  await browser.close()

                  # 결과 요약
                  print("\n\n====== 무료 가용 도구 요약 ======")
                  for name, data in results.items():
                      plans = data.get('free_plan', [])
                      has_free = any('free' in p.lower() or '$0' in p for p in plans)
                      print(f"  {'✅' if has_free else '❌'} {name}: {'무료 플랜 있음' if has_free else '유료만'}")

          asyncio.run(main())
          PYEOF
