name: Crawl Partners API Playground
on:
  workflow_dispatch: {}
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install
        run: pip install playwright && python -m playwright install chromium --with-deps
      - name: Crawl API Playground and FAQ
        run: |
          python3 - << 'PYEOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  
                  # FAQ 페이지
                  faq_urls = [
                      "https://partners.coupang.com/#help/open-api/faq",
                      "https://partners.coupang.com/#help/open-api/api/deeplink",
                      "https://partners.coupang.com/#help/open-api/guide",
                  ]
                  
                  for url in faq_urls:
                      await page.goto(url, timeout=20000)
                      await page.wait_for_timeout(5000)
                      
                      # 클릭 가능한 탭/메뉴 찾기
                      all_items = await page.query_selector_all("li, a, button, .tab, [role='tab']")
                      for item in all_items:
                          txt = (await item.inner_text()).strip()
                          if any(k in txt.lower() for k in ['faq', '자주', '묻는', '플레이', 'playground', 'deeplink', '딥링크', 'rate', '제한']):
                              try:
                                  await item.click()
                                  await page.wait_for_timeout(2000)
                                  content = await page.inner_text("body")
                                  if any(k in content for k in ['rate', '제한', '횟수', '100', 'limit', '초과']):
                                      print(f"=== FOUND RATE LIMIT in [{txt}] ===")
                                      print(content[:5000])
                                      break
                              except: pass
                      
                      full_txt = await page.inner_text("body")
                      print(f"\n=== {url} (전체) ===")
                      print(full_txt[:8000])
                  
                  await browser.close()
          
          asyncio.run(main())
          PYEOF
