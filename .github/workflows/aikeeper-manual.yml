name: Manual Post to Blogger

on:
  push:
    branches: [main]
    paths:
      - 'posts/**.md'

jobs:
  manual-post:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: pip3 install -r requirements.txt -q

      - name: Get new markdown files
        id: files
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'posts/*.md' > /tmp/changed_files.txt
          else
            git show --name-only --diff-filter=A HEAD -- 'posts/*.md' | grep '\.md$' > /tmp/changed_files.txt || true
          fi
          COUNT=$(grep -c . /tmp/changed_files.txt 2>/dev/null || true)
          COUNT=${COUNT:-0}
          echo "count=${COUNT}" >> $GITHUB_OUTPUT
          echo "새 포스트 수: $COUNT"
          cat /tmp/changed_files.txt

      - name: Post new files to Blogger
        if: steps.files.outputs.count > 0
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] || [ ! -f "$file" ] && continue
            python3 scripts/add_images.py "$file" || true
            python3 scripts/post_to_blogger.py "$file"
          done < /tmp/changed_files.txt

      - name: No new posts
        if: steps.files.outputs.count == 0
        run: echo "새 포스트 없음 — 정상 종료"
