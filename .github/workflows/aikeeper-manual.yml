name: Manual Post to Blogger

on:
  push:
    branches: [main]
    paths:
      - 'posts/**.md'

jobs:
  manual-post:
    runs-on: self-hosted

    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
      BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
      BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: pip3 install -r requirements.txt -q

      - name: Get new markdown files
        id: files
        run: |
          # 새로 추가된 파일만 (diff-filter=A)
          git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'posts/*.md' > /tmp/changed_files.txt 2>/dev/null || true
          # 파일 없으면 빈 파일로 초기화
          touch /tmp/changed_files.txt
          COUNT=0
          if [ -s /tmp/changed_files.txt ]; then
            COUNT=$(grep -c . /tmp/changed_files.txt)
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "새 포스트 수: $COUNT"
          cat /tmp/changed_files.txt

      - name: Post new files to Blogger
        if: steps.files.outputs.count > 0
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] || [ ! -f "$file" ] && continue
            python3 scripts/add_images.py "$file" || true
            python3 scripts/post_to_blogger.py "$file"
          done < /tmp/changed_files.txt

      - name: No new posts
        if: steps.files.outputs.count == 0
        run: echo "새로 추가된 포스트 없음 (수정된 파일은 자동 제외)"
