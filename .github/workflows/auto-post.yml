name: AI Auto Post to Blogger

on:
  schedule:
    - cron: '0 0 * * *'   # KST 09:00
    - cron: '0 6 * * *'   # KST 15:00
  workflow_dispatch:
    inputs:
      topic:
        description: '블로그 주제 (비워두면 자동 발굴)'
        required: false
        default: ''
      keywords:
        description: '키워드 (쉼표 구분)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'posts/**.md'

jobs:
  # ── AI 자동 생성 포스팅 (schedule + workflow_dispatch) ──
  auto-post:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scrapling playwright
          scrapling install-pw --browsers chromium

      - name: Find or use topic
        id: topic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          MANUAL_TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$MANUAL_TOPIC" ]; then
            echo "topic=$MANUAL_TOPIC" >> $GITHUB_OUTPUT
            echo "keywords=${{ github.event.inputs.keywords }}" >> $GITHUB_OUTPUT
            echo "angle=" >> $GITHUB_OUTPUT
          else
            OUTPUT=$(python scripts/find_topics.py 2>&1)
            echo "$OUTPUT"
            TOPIC=$(echo "$OUTPUT" | grep "^TOPIC:" | sed 's/^TOPIC://')
            KEYWORDS=$(echo "$OUTPUT" | grep "^KEYWORDS:" | sed 's/^KEYWORDS://')
            ANGLE=$(echo "$OUTPUT" | grep "^ANGLE:" | sed 's/^ANGLE://')
            echo "topic=$TOPIC" >> $GITHUB_OUTPUT
            echo "keywords=$KEYWORDS" >> $GITHUB_OUTPUT
            echo "angle=$ANGLE" >> $GITHUB_OUTPUT
          fi

      - name: Generate post
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          OUTPUT=$(python scripts/generate_post.py \
            "${{ steps.topic.outputs.topic }}" \
            "${{ steps.topic.outputs.keywords }}" \
            "${{ steps.topic.outputs.angle }}" 2>&1)
          echo "$OUTPUT"
          FILE=$(echo "$OUTPUT" | grep "^posts/" | tail -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "생성된 파일: [$FILE]"
          [ -f "$FILE" ] || (echo "❌ 파일 없음" && exit 1)

      - name: Add images
        continue-on-error: true
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          [ -z "$UNSPLASH_ACCESS_KEY" ] && echo "이미지 스킵" && exit 0
          python scripts/add_images.py "${{ steps.gen.outputs.file }}" || true

      - name: Post to Blogger
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: |
          python scripts/post_to_blogger.py "${{ steps.gen.outputs.file }}"

      - name: Commit post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet || git commit -m "auto: AI 포스트 $(date +'%Y-%m-%d %H:%M KST')"
          git push || true

  # ── 수동 .md push 시 포스팅 ──
  manual-post:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get new markdown files
        id: files
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'posts/*.md' > changed_files.txt
          else
            git show --name-only --diff-filter=A HEAD -- 'posts/*.md' | grep '\.md$' > changed_files.txt || true
          fi
          COUNT=$(grep -c . changed_files.txt 2>/dev/null || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "새 파일 수: $COUNT"
          cat changed_files.txt

      - name: Post to Blogger
        if: steps.files.outputs.count > 0
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] || [ ! -f "$file" ] && continue
            [ -n "$UNSPLASH_ACCESS_KEY" ] && python scripts/add_images.py "$file" || true
            python scripts/post_to_blogger.py "$file"
          done < changed_files.txt

      - name: Skip
        if: steps.files.outputs.count == 0
        run: echo "새 포스트 없음"
